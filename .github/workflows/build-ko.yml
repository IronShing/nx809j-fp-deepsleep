name: Build fp_deepsleep.ko

# Reproducible build of a LOADABLE custom KCFI module for NX809J
# (6.12.23-android16-OP-WILD). Encodes the full load gauntlet (see README):
# MODVERSIONS + KCFI + CFI integer-normalize + MODULE_SIG(sha256) + module_layout
# CRC patch. Builds against GKI android16-6.12 (same GKI base as the device).
#
# NOTE: the deep-doze FP *fix* via this module is DISPROVEN (README) — the module
# is now a log-only probe / loadable-module template. This CI exists to keep the
# loadable-KCFI capability reproducible for future kernel RE on this device.

on:
  workflow_dispatch:
    inputs:
      kernel_ref:
        description: "GKI common branch/tag"
        type: string
        default: "android16-6.12"
      clang_version:
        description: "AOSP prebuilt clang dir"
        type: string
        default: "clang-r547379"
      module_layout_crc:
        description: "device module_layout CRC to patch to (NX809J = 0xe976b219)"
        type: string
        default: "0xe976b219"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout module
        uses: actions/checkout@v4
        with: { path: mod }

      - name: Install deps (incl. libdw for gendwarfksyms/MODVERSIONS)
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev libelf-dev libdw-dev elfutils cpio git

      - name: Fetch GKI common kernel + AOSP clang
        run: |
          git clone --depth 1 -b "${{ inputs.kernel_ref }}" \
            https://android.googlesource.com/kernel/common kernel
          git clone --depth 1 \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clangdir
          echo "KDIR=$PWD/kernel" >> "$GITHUB_ENV"
          echo "PATH=$PWD/clangdir/${{ inputs.clang_version }}/bin:$PATH" >> "$GITHUB_ENV"

      - name: Configure (full gauntlet) + full build for Module.symvers
        working-directory: kernel
        run: |
          export ARCH=arm64 LLVM=1 LLVM_IAS=1
          make gki_defconfig
          # The five gates that make a module LOAD on this kernel:
          ./scripts/config -e KPROBES -e MODULES -e KALLSYMS_ALL \
            -e MODVERSIONS \
            -e CFI_CLANG -d LTO_CLANG_FULL -d LTO_CLANG_THIN -e LTO_NONE \
            -e CFI_ICALL_NORMALIZE_INTEGERS \
            -e MODULE_SIG -e MODULE_SIG_SHA256 -d MODULE_SIG_SHA1 -d MODULE_SIG_FORCE
          make olddefconfig
          # olddefconfig updates .config but not auto.conf — modules_prepare drives the flags
          make modules_prepare prepare scripts -j"$(nproc)"
          grep -E "CFI_CLANG|NORMALIZE_INTEGERS|MODVERSIONS|MODULE_SIG=|LTO_NONE|SIG_SHA256" .config || true
          # full build → Module.symvers (symbol CRCs)
          make Image -j"$(nproc)"

      - name: Build the module
        run: |
          export ARCH=arm64 LLVM=1 LLVM_IAS=1
          make -C "$KDIR" M="$PWD/mod" modules -j"$(nproc)"
          modinfo mod/fp_deepsleep.ko 2>/dev/null | grep -E "vermagic|name" || true

      - name: Patch module_layout CRC to the device value
        run: |
          python3 - "$KDIR" mod/fp_deepsleep.ko "${{ inputs.module_layout_crc }}" <<'PY'
          import sys, struct, subprocess, re
          kdir, ko, want = sys.argv[1], sys.argv[2], int(sys.argv[3], 16)
          data = bytearray(open(ko, 'rb').read())
          # __versions entries: <u32 crc><56-byte name>; find module_layout, patch crc
          name = b"module_layout"
          patched = 0
          for m in re.finditer(re.escape(name), bytes(data)):
              off = m.start() - 4
              if off >= 0:
                  struct.pack_into("<I", data, off, want)
                  patched += 1
          open(ko, 'wb').write(data)
          print(f"patched module_layout -> {hex(want)} ({patched} entr{'y' if patched==1 else 'ies'})")
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fp_deepsleep-ko
          path: mod/fp_deepsleep.ko
